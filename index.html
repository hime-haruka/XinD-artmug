<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>씬디님-아트머그</title>

    <link rel="stylesheet" href="./static/css/common.css">
</head>
<body>
    <main class="main">
        <section class="sec" id="intro"></section>
        <section class="sec" id="slot"></section>
        <section class="sec" id="notice"></section>
        <section class="sec" id="sample"></section>
        <section class="sec" id="form">
        <div class="sec-frame form-shell">
            <div class="ui-window form-window">
            <div class="ui-cloud is-2 top-right"></div>

            <div class="ui-window__bar">
                <div class="ui-window__title">
                <span class="ui-window__dots">
                    <span class="ui-dot is-sky"></span>
                    <span class="ui-dot is-blue"></span>
                    <span class="ui-dot is-white"></span>
                </span>
                <span>문의 양식</span>
                </div>
            </div>

            <div class="ui-window__body form-body">
                <header class="form-hero">
                <h2 class="form-title">신청 양식</h2>
                <p class="form-desc">필요한 항목만 체크해서 수량 입력 후 복사해서 전달해주세요.</p>
                </header>

                <div class="form-grid">
                <section class="form-panel">
                    <div class="form-panel__head">
                    <h3 class="form-panel__title">기본 정보</h3>
                    </div>

                    <div class="form-row">
                    <label class="form-label" for="formPlatformNickname">방송 플랫폼 / 닉네임</label>
                    <input
                        id="formPlatformNickname"
                        class="form-input"
                        type="text"
                        placeholder="예: 치지직 / 씬디"
                    >
                    <p class="form-help">활동 중인 플랫폼과 닉네임을 적어주세요.</p>
                    </div>
                </section>

                <section class="form-panel">
                    <div class="form-panel__head">
                    <h3 class="form-panel__title">신청 옵션 선택</h3>
                    </div>

                    <div class="form-check-grid form-check-grid--wide">
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-sub-emote"><span>구독티콘</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-anim-emote"><span>움짤티콘</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-sub-badge"><span>구독뱃지</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-anim-badge"><span>움짤뱃지</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-profile"><span>프로필 사진</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-banner"><span>하단배너</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-ziptok"><span>짚톡</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-sd-full"><span>SD 일러스트 (전신)</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-sd-bust"><span>SD 일러스트 (흉상)</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-md-full"><span>MD 일러스트 (전신)</span></label>
                    <label class="form-check"><input type="checkbox" class="form-category-check" data-target="option-fan-character"><span>팬캐릭터</span></label>
                    </div>

                    <div class="form-option-list">
                    <div class="form-option-card" id="option-sub-emote" hidden>
                        <div class="form-option-row">
                        <div class="form-option-card__title">구독티콘</div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="subEmoteQty">수량</label>
                            <input id="subEmoteQty" class="form-input form-input--qty form-input--compact" type="number" min="1" step="1" placeholder="0">
                        </div>
                        </div>
                    </div>

                    <div class="form-option-card" id="option-anim-emote" hidden>
                        <div class="form-option-row">
                        <div class="form-option-card__title">움짤티콘</div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="animEmoteQty">수량</label>
                            <input id="animEmoteQty" class="form-input form-input--qty form-input--compact" type="number" min="1" step="1" placeholder="0">
                        </div>
                        </div>
                    </div>

                    <div class="form-option-card" id="option-sub-badge" hidden>
                        <div class="form-option-row">
                        <div class="form-option-card__title">구독뱃지</div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="subBadgeQty">수량</label>
                            <input id="subBadgeQty" class="form-input form-input--qty form-input--compact" type="number" min="1" step="1" placeholder="0">
                        </div>
                        </div>
                    </div>

                    <div class="form-option-card" id="option-anim-badge" hidden>
                        <div class="form-option-row">
                        <div class="form-option-card__title">움짤뱃지</div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="animBadgeQty">수량</label>
                            <input id="animBadgeQty" class="form-input form-input--qty form-input--compact" type="number" min="1" step="1" placeholder="0">
                        </div>
                        </div>
                    </div>

                    <div class="form-option-card" id="option-profile" hidden>
                        <div class="form-option-row">
                        <div class="form-option-card__title">프로필 사진</div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="profileQty">수량</label>
                            <input id="profileQty" class="form-input form-input--qty form-input--compact" type="number" min="1" step="1" placeholder="0">
                        </div>
                        </div>
                    </div>

                    <div class="form-option-card" id="option-banner" hidden>
                        <div class="form-option-card__title" style="margin-bottom: 10px;">하단배너</div>
                        <div class="form-compact-grid form-compact-grid--two">
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="bannerFixedQty">고정형</label>
                            <input id="bannerFixedQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                        </div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="bannerFreeQty">자유형</label>
                            <input id="bannerFreeQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                        </div>
                        </div>
                    </div>

                    <div class="form-option-card" id="option-ziptok" hidden>
                        <div class="form-option-card__title" style="margin-bottom: 10px;">짚톡</div>
                        <div class="form-compact-grid form-compact-grid--two">
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="ziptokStandQty">차렷</label>
                            <input id="ziptokStandQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                        </div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="ziptokDeskQty">책상 세트</label>
                            <input id="ziptokDeskQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                        </div>
                        </div>
                        <p class="form-help">책상 세트는 키보드 또는 게임패드 + 소품 구성입니다.</p>
                    </div>

                    <div class="form-option-card form-option-card--illust" id="option-sd-full" hidden>
                        <div class="form-option-card__title" style="margin-bottom: 10px;">SD 일러스트 (전신)</div>
                        <div class="form-license-list form-license-list--triple">
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="sdFullPersonalQty">개인용</label>
                            <input id="sdFullPersonalQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="sdFullStreamQty">방송용</label>
                            <input id="sdFullStreamQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="sdFullCommercialQty">상업용</label>
                            <input id="sdFullCommercialQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                        </div>
                    </div>

                    <div class="form-option-card form-option-card--illust" id="option-sd-bust" hidden>
                        <div class="form-option-card__title" style="margin-bottom: 10px;">SD 일러스트 (흉상)</div>
                        <div class="form-license-list form-license-list--triple">
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="sdBustPersonalQty">개인용</label>
                            <input id="sdBustPersonalQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="sdBustStreamQty">방송용</label>
                            <input id="sdBustStreamQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="sdBustCommercialQty">상업용</label>
                            <input id="sdBustCommercialQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                        </div>
                    </div>

                    <div class="form-option-card form-option-card--illust" id="option-md-full" hidden>
                        <div class="form-option-card__title" style="margin-bottom: 10px;">MD 일러스트 (전신)</div>
                        <div class="form-license-list form-license-list--triple">
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="mdFullPersonalQty">개인용</label>
                            <input id="mdFullPersonalQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="mdFullStreamQty">방송용</label>
                            <input id="mdFullStreamQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                          <div class="form-inline-field">
                            <label class="form-inline-field__label" for="mdFullCommercialQty">상업용</label>
                            <input id="mdFullCommercialQty" class="form-input form-input--qty form-input--compact" type="number" min="0" step="1" placeholder="0">
                          </div>
                        </div>
                    </div>

                    <div class="form-option-card" id="option-fan-character" hidden>
                        <div class="form-option-row">
                        <div class="form-option-card__title">팬캐릭터</div>
                        <div class="form-inline-field">
                            <label class="form-inline-field__label" for="fanCharacterQty">수량</label>
                            <input id="fanCharacterQty" class="form-input form-input--qty form-input--compact" type="number" min="1" step="1" placeholder="0">
                        </div>
                        </div>
                    </div>
                    </div>
                </section>

                <section class="form-panel form-panel--compact">
                    <div class="form-panel__head">
                    <h3 class="form-panel__title">자료 및 요청사항</h3>
                    </div>

                    <div class="form-request-grid">
                    <div class="form-field">
                        <label class="form-label" for="formCharacterRef">캐릭터 자료</label>
                        <textarea
                        id="formCharacterRef"
                        class="form-textarea is-short"
                        rows="3"
                        placeholder="상반신과 팔 전체가 드러나는 자료를 첨부해주세요. 추가 설명 자유"
                        ></textarea>
                    </div>

                    <div class="form-field">
                        <label class="form-label" for="formRequestContent">신청 내용</label>
                        <textarea
                        id="formRequestContent"
                        class="form-textarea is-short"
                        rows="3"
                        placeholder="예: 하이, 응원봉, 하트안기 신청합니다. 배너는 유튜브와 디스코드로 부탁드립니다."
                        ></textarea>
                    </div>

                    <div class="form-field form-field--full">
                        <label class="form-label" for="formEtcRequest">기타 요청사항</label>
                        <textarea
                        id="formEtcRequest"
                        class="form-textarea is-mini"
                        rows="2"
                        placeholder="빠른마감, 일정 기간 비공개 등 필요하신 부분을 기재해주세요."
                        ></textarea>
                    </div>
                    </div>
                </section>
                </div>

                <div class="form-actions">
                <button type="button" class="ui-btn is-fill form-action-btn" id="copyFormBtn">양식 복사</button>
                <button type="button" class="ui-btn is-soft form-action-btn" id="resetFormBtn">초기화</button>
                </div>
            </div>
            </div>
        </div>
        </section>
    </main>

    <button type="button" class="top-btn" id="topBtn" aria-label="페이지 상단으로 이동"><span class="top-btn__arrow"></span></button>
</body>

<script src="./static/js/app.js" defer></script>
</html>
